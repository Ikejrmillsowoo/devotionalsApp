server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devotionals
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  mail:
    host: localhost
    port: 1025

app:
  jobs:
    dailyLessonCron: "0 0/15 * * * *"
    reminderDispatchCron: "0 * * * * *"

  reminders:
    jitterMinutes: 10